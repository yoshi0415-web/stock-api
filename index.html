<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株ツリー</title>

  <link rel="apple-touch-icon" href="icon1.0.PNG">
  <link rel="icon" href="icon1.0.PNG">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <main class="app">
    <header class="app-header">
      <h1 class="app-title">🌳 株ツリー</h1>
    </header>

    <section class="filters">
      <button id="risingButton" class="show-button" type="button">上昇中</button>
      <button id="fallingButton" class="show-button" type="button">下落中</button>
      <button id="bullishButton" class="show-button" type="button">陽線連続</button>
      <button id="volumeButton" class="show-button" type="button">出来高増</button>
    </section>

    <section class="result-section">
      <h2>候補銘柄</h2>
      <ul id="resultList"></ul>
    </section>

    <section class="chart-section">
      <h2 id="chartTitle">チャート</h2>
      <canvas id="chart" width="400" height="300"></canvas>
    </section>
    <div id="loadingBlocker" class="loading-blocker"></div>
    
    <section class="log-section">
  <h2>ログ</h2>
  <pre id="logArea"></pre>
</section>
    
  </main>

  <div class="version-text">
    Ver 2026.04.19-8
  </div>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js");
    }
  </script>
  <div class="version-text">
  Ver 2026.04.19-13-4
</div>
</body>
</html>
