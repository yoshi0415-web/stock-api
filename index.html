<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>株ツリー</title>

  <link rel="apple-touch-icon" href="icon1.0.PNG">
  <link rel="icon" href="icon1.0.PNG">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app">
    <header class="app-header">
      <h1 class="app-title">🌳 株ツリー</h1>
      <p class="app-subtitle">銘柄コードを入力して株価チャートを表示</p>
    </header>

    <section class="controls">
      <input
        id="code"
        class="code-input"
        type="text"
        inputmode="numeric"
        placeholder="銘柄コード（例: 7203）"
      >
      <button id="showButton" class="show-button" type="button">
        表示
      </button>
    </section>

    <section class="chart-section">
      <canvas id="chart" width="400" height="300"></canvas>
    </section>
  </main>

  <script src="script.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(function (error) {
        console.log("Service Worker registration failed:", error);
      });
    }
  </script>
</body>
</html>
