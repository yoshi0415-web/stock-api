/* 001 */ name: Update stocks data
/* 002 */ 
/* 003 */ on:
/* 004 */   workflow_dispatch:
/* 005 */ 
/* 006 */   schedule:
/* 007 */     - cron: "0 9 * * *"
/* 008 */ 
/* 009 */ permissions:
/* 010 */   contents: write
/* 011 */ 
/* 012 */ jobs:
/* 013 */   update-stocks:
/* 014 */     runs-on: ubuntu-latest
/* 015 */ 
/* 016 */     steps:
/* 017 */       - name: Checkout repository
/* 018 */         uses: actions/checkout@v4
/* 019 */ 
/* 020 */       - name: Setup Node.js
/* 021 */         uses: actions/setup-node@v4
/* 022 */         with:
/* 023 */           node-version: 20
/* 024 */ 
/* 025 */       - name: Run update script
/* 026 */         env:
/* 027 */           JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
/* 028 */         run: node scripts/update-stocks.js
/* 029 */ 
/* 030 */       - name: Commit updated stocks.json
/* 031 */         run: |
/* 032 */           git config user.name "github-actions"
/* 033 */           git config user.email "github-actions@github.com"
/* 034 */           git add stocks.json
/* 035 */           git commit -m "Update stocks.json" || echo "No changes"
/* 036 */           git pull --rebase
/* 037 */           git push