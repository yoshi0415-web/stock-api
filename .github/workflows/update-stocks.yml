name: Update stocks data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1-5"

permissions:
  contents: write

jobs:
  update-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run update script
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
        run: node scripts/update-stocks.js

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add stocks.json
          git commit -m "Update stocks.json" || echo "No changes"
          git push
